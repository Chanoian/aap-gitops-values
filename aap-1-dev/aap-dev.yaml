# Layer 2 — Instance-specific configuration for aap-1-dev
# Overrides Layer 1. Overridden by namespace layer.

name:                          # AAP instance name, e.g. aap-1-dev
hostname:                      # Public route hostname, e.g. aap-1-dev.apps.cluster.example.com

admin_password_secret:         # Name of pre-created k8s secret holding admin password
db_fields_encryption_secret:   # Name of pre-created k8s secret for DB field encryption

image_pull_policy:             # e.g. IfNotPresent
no_log:                        # true/false — suppress sensitive output in operator logs
route_tls_termination_mechanism: # e.g. Edge, Passthrough, Reencrypt

api:
  replicas:                    # e.g. 1

controller:
  replicas:                    # e.g. 1

eda:
  enabled:                     # true/false
  replicas:                    # e.g. 1

hub:
  enabled:                     # true/false
  replicas:                    # e.g. 1

database:
  database_secret:             # Name of pre-created k8s secret for DB credentials

redis:
  replicas:                    # e.g. 1
