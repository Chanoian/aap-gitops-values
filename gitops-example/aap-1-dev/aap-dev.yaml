# Layer 2 — Instance-specific configuration for aap-1-dev
# Overrides Layer 1. Overridden by namespace layer.

name: aap                              # AAP instance name
no_log: false                          # true/false — suppress sensitive output in operator logs
redis_mode: standalone                 # standalone or clustered


route_tls_termination_mechanism: Edge  # Edge, Passthrough, or Reencrypt

api:
  replicas: 2

controller:
  disabled: false
  no_log: false
  replicas: 2

eda:
  disabled: false
  no_log: false
  replicas: 1

hub:
  disabled: true
  no_log: false
  replicas: 1

database:
  postgres_storage_class: ocs-external-storagecluster-ceph-rbd

redis:
  replicas: 1
